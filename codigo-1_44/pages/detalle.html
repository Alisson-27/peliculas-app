<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Detalle de Película</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #0b0f19;
      color: white;
    }

    .card {
      background: #141a2a;
      color: white;
      border: none;
      border-radius: 12px;
    }

    .badge {
      font-size: 0.85rem;
    }

    iframe {
      border-radius: 12px;
    }

    img {
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="container py-5">

    <!-- TITULO -->
    <div class="text-center mb-4">
      <h1 id="titulo" class="fw-bold"></h1>

      <div class="alert alert-info mt-3">
        🎬 Disfruta del tráiler oficial de la película
      </div>
    </div>

    <!-- TRAILER -->
    <div class="ratio ratio-16x9 mb-4">
      <iframe id="trailer" src="" allowfullscreen></iframe>
    </div>

    <!-- CARD -->
    <div class="card mb-4 shadow-lg">
      <div class="row g-0">

        <div class="col-md-4">
          <img id="poster" src="" class="img-fluid" alt="poster">
        </div>

        <div class="col-md-8">
          <div class="card-body">

            <h5 class="card-title">Sinopsis</h5>
            <p id="sinopsis"></p>

            <h6>Género:</h6>
            <span id="genero" class="badge bg-secondary"></span>

            <div class="mt-3">
              <h6>Precios:</h6>
              <span id="precioEstreno" class="badge bg-warning text-dark"></span>
              <span id="precioNormal" class="badge bg-success ms-2"></span>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- BOTON -->
    <div class="text-center">
      <a href="../index.html" class="btn btn-light">
        ⬅ Volver al inicio
      </a>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

  <script>
    $(function () {

      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get("id");

      $.ajax({
        url: "../data/peliculas.json",
        method: "GET",
        dataType: "json",

        success: function (peliculas) {

          const peli = peliculas.find(p => p.id == id);

          if (!peli) {
            $("body").html(`
              <div class="container text-center py-5">
                <div class="alert alert-danger">
                  Película no encontrada
                </div>
                <a href="../index.html" class="btn btn-light">Volver</a>
              </div>
            `);
            return;
          }

          $("#titulo").text(peli.titulo);
          $("#poster").attr("src", "../img/" + peli.imagen);
          $("#sinopsis").text(peli.sinopsis);
          $("#trailer").attr("src", peli.trailer);

          $("#genero").text(peli.genero.join(" / "));

          $("#precioEstreno").text("Estreno: $" + peli.precios.estreno);
          $("#precioNormal").text("Normal: $" + peli.precios.normal);

        },

        error: function () {
          $("body").html(`
            <div class="container text-center py-5">
              <div class="alert alert-danger">
                Error al cargar la película
              </div>
              <a href="../index.html" class="btn btn-light">Volver</a>
            </div>
          `);
        }

      });

    });
  </script>

</body>
</html>
