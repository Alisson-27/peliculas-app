<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0b0f19;
      color: white;
    }

    .card {
      background: #141a2a;
      color: white;
      border: none;
    }

    .error {
      color: #ff4d4d;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <h2 class="text-center mb-4">📩 Contacto</h2>

  <div class="card p-4">

    <label>Nombre</label>
    <input type="text" id="nombre" class="form-control mb-1">
    <div id="errorNombre" class="error"></div>

    <label>Email</label>
    <input type="email" id="email" class="form-control mb-1">
    <div id="errorEmail" class="error"></div>

    <label>Mensaje</label>
    <textarea id="mensaje" class="form-control mb-1"></textarea>
    <div id="errorMensaje" class="error"></div>

    <button class="btn btn-danger w-100 mt-3" id="btnEnviar">
      Enviar
    </button>

    <div id="exito" class="text-success mt-3"></div>
        <a class="nav-link" href="../index.html">Inicio</a>
<a class="nav-link active" href="contacto.html">Contacto</a>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<script>
$(document).ready(function () {

  $("#btnEnviar").click(function () {

    let nombre = $("#nombre").val().trim();
    let email = $("#email").val().trim();
    let mensaje = $("#mensaje").val().trim();

    let valido = true;

    $(".error").text("");
    $("#exito").text("");

    // 🧠 VALIDACIONES

    if (nombre === "") {
      $("#errorNombre").text("El nombre es obligatorio");
      valido = false;
    }

    if (email === "") {
      $("#errorEmail").text("El email es obligatorio");
      valido = false;
    } else if (!email.includes("@")) {
      $("#errorEmail").text("Email inválido");
      valido = false;
    }

    if (mensaje.length < 20 || mensaje.length > 50) {
      $("#errorMensaje").text("El mensaje debe tener entre 20 y 50 caracteres");
      valido = false;
    }

    // ✅ SI TODO OK
    if (valido) {

      $("#exito").text("Mensaje enviado correctamente 🎉");

      $("#nombre").val("");
      $("#email").val("");
      $("#mensaje").val("");

    }

  });

});
</script>

</body>
</html>
