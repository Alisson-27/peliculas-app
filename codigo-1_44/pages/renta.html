<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Renta de Películas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: #0b0f19;
        color: white;
    }

    .card {
        background: #141a2a;
        color: white;
        border: none;
    }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">🎬 Renta de Películas</h2>

    <!-- FORM -->
    <div class="card p-4">

    <label class="form-label">Cliente</label>
    <input type="text" id="cliente" class="form-control mb-3">

    <label class="form-label">Películas</label>
    <select id="peliculas" class="form-select mb-3" multiple></select>

    <label class="form-label">Días de renta</label>
    <input type="number" id="dias" class="form-control mb-3" min="1" value="1">

    <label class="form-label">Forma de pago</label>
    <select id="pago" class="form-select mb-3">
        <option>Efectivo</option>
        <option>Tarjeta</option>
    </select>

    <button class="btn btn-danger w-100" id="btnRentar">
        Confirmar Renta 🎬
    </button>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalRenta" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

        <div class="modal-header">
        <h5 class="modal-title">Resumen de Renta</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="resumen"></div>

    </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="../data/peliculas.json"></script>

<script>
$(document).ready(function () {

    let peliculasData = [];

  // 📥 CARGAR PELÍCULAS
    $.getJSON("../data/peliculas.json", function (data) {

    peliculasData = data;

    data.forEach(p => {
        $("#peliculas").append(`
        <option value="${p.id}">${p.titulo}</option>
        `);
    });

    });

  // 💰 PROCESAR RENTA
    $("#btnRentar").click(function () {

    let cliente = $("#cliente").val();
    let dias = $("#dias").val();
    let pago = $("#pago").val();

    let seleccionadas = $("#peliculas").val();

    if (!cliente || !seleccionadas) {
        alert("Completa los datos");
        return;
    }

    let total = 0;
    let lista = "";

    seleccionadas.forEach(id => {

        let peli = peliculasData.find(p => p.id == id);

      total += peli.precios.normal * dias;

        lista += `<li>${peli.titulo}</li>`;

    });

    $("#resumen").html(`
        <p><b>Cliente:</b> ${cliente}</p>
        <p><b>Días:</b> ${dias}</p>
        <p><b>Pago:</b> ${pago}</p>
        <p><b>Películas:</b></p>
        <ul>${lista}</ul>
        <h4>Total: $${total}</h4>
    `);

    let modal = new bootstrap.Modal(document.getElementById("modalRenta"));
    modal.show();

    });

});
</script>

</body>
</html>
